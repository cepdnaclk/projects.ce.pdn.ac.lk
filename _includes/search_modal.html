<div
  class="modal fade"
  id="algoliaSearchModal"
  tabindex="-1"
  role="dialog"
  aria-labelledby="algoliaSearchModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog modal-lg" role="document">
    <div class="modal-content">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title" id="algoliaSearchModalLabel">Project Search</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body pt-2">
        {% include search_form.html id_suffix="modal" %}
        <div id="algolia-search-status" class="small text-muted mt-3 mb-3"></div>
        <div id="algolia-search-loader" class="d-none text-center my-4" role="status">
          <p class="text-primary font-weight-bold mb-0">Searching project records...</p>
        </div>
        <div id="algolia-search-results" class="list-group list-group-flush"></div>
      </div>
      <div class="modal-footer border-0 justify-content-between align-items-center flex-wrap">
        <nav id="algolia-search-pagination" class="d-none" aria-label="Search results pagination">
          <ul class="pagination pagination-sm mb-0"></ul>
        </nav>
        <div class="small text-muted" id="algolia-search-count"></div>
        <div class="small text-muted">Powered by Algolia Search</div>
      </div>
    </div>
  </div>
</div>
